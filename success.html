<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Request Sent</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f3;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      background: white;
      max-width: 600px;
      width: 100%;
      padding: 40px 30px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #1f7a4d;
      margin-bottom: 16px;
    }

    p {
      margin-bottom: 24px;
      font-size: 1.05rem;
    }

    a {
      display: inline-block;
      background: #1f7a4d;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      background: #17633f;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Thank You</h1>
    <p>Your quote request was sent successfully. We will get back to you soon.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
